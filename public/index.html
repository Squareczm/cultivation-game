<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职场修仙模拟器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

@font-face {
  font-family: 'Zpix';
  src: url('https://cdn.jsdelivr.net/gh/SolidZORO/zpix-pixel-font@main/dist/zpix.ttf') format('truetype');
  font-display: swap;
}

* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: grayscale;
  image-rendering: pixelated;
}

body {
  background: #1a1a2e;
  background-image:
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(0deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 8px 8px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Zpix', 'Press Start 2P', 'VT323', monospace;
  overflow: auto;
  color: #ffb000;
  padding: 12px 0;
}

.machine {
  width: 500px;
  max-width: 96vw;
  background: #2a2a3e;
  padding: 20px 20px 24px;
  position: relative;
  box-shadow:
    0 0 0 2px #4a4a5e,
    0 0 0 6px #15152a,
    0 0 0 8px #4a4a5e,
    0 0 0 12px #15152a,
    8px 8px 0 0 rgba(0,0,0,0.4);
}

.machine-label {
  text-align: center;
  color: #cc8800;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.machine-sublabel {
  text-align: center;
  color: #4a4a6a;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.screen-bezel {
  background: #0d0d15;
  padding: 8px;
  margin-bottom: 20px;
  box-shadow:
    inset 0 0 0 2px #000,
    0 0 0 2px #4a4a5e;
}

.screen {
  background: #0a0a0a;
  padding: 14px 16px;
  min-height: 560px;
  max-height: 560px;
  overflow: hidden;
  position: relative;
  color: #ffb000;
  font-family: 'Zpix', 'VT323', monospace;
  font-size: 14px;
  line-height: 1.6;
}

@media (max-height: 720px) {
  .screen { min-height: 500px; max-height: 500px; }
}

@media (max-width: 420px) {
  .screen { padding: 12px; font-size: 13px; }
}

.screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.25) 0px,
    rgba(0,0,0,0.25) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 1;
}

.screen::after { content: none; }

.screen > * { position: relative; z-index: 3; }

.stats-bar {
  display: flex;
  justify-content: space-between;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 9px;
  color: #cc8800;
  border-bottom: 2px dotted #996600;
  padding-bottom: 6px;
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.title-art {
  text-align: center;
  margin: 16px 0;
  font-size: 13px;
  line-height: 1.5;
  color: #ffb000;
}

.title-art .big {
  font-size: 22px;
  letter-spacing: 6px;
  margin: 14px 0;
  color: #ffdd44;
  text-shadow:
    2px 0 0 #996600,
    0 2px 0 #996600,
    2px 2px 0 #996600;
}

.scene-title {
  text-align: center;
  margin: 3px 0;
  font-size: 13px;
  color: #cc8800;
}

.scene-flavor {
  text-align: center;
  font-size: 12px;
  color: #996600;
  margin-bottom: 5px;
}

.narrative {
  margin: 5px 0 6px;
  font-size: 13px;
  line-height: 1.55;
}

.divider {
  text-align: center;
  color: #ffb00040;
  margin: 3px 0;
  font-size: 11px;
  letter-spacing: 2px;
}

.choice {
  margin: 3px 0;
  font-size: 13px;
  cursor: pointer;
  padding: 3px 5px;
  line-height: 1.4;
  color: #ffb000;
}

.choice:hover, .choice.selected {
  color: #0a0a0a;
  background: #ffb000;
  text-shadow: none;
}

.choice .key {
  display: inline-block;
  width: 20px;
  color: inherit;
}

.choice .tag {
  display: inline;
  font-size: 10px;
  color: #996600;
  margin-left: 8px;
  white-space: nowrap;
}

.choice.selected .tag { color: #331a00; }

.result-text {
  margin: 5px 0;
  font-size: 13px;
  line-height: 1.55;
}

.result-text .gain { color: #44dd44; }
.result-text .lose { color: #ff4444; }
.result-text .event { color: #44bbff; }
.result-text .item { color: #dd44dd; }

.prompt {
  text-align: center;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 9px;
  color: #996600;
  margin-top: 8px;
  letter-spacing: 1px;
  animation: blink 1s steps(2) infinite;
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 8px;
}

.dpad {
  display: grid;
  grid-template-columns: 40px 40px 40px;
  grid-template-rows: 40px 40px 40px;
  gap: 0;
}

.dpad-btn {
  width: 40px;
  height: 40px;
  background: #15151f;
  border: 0;
  color: #ffb000;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  box-shadow:
    inset 2px 2px 0 0 #4a4a5e,
    inset -2px -2px 0 0 #000;
}

.dpad-btn:active {
  background: #0a0a12;
  box-shadow:
    inset -2px -2px 0 0 #4a4a5e,
    inset 2px 2px 0 0 #000;
}

.dpad-btn.empty { background: transparent; box-shadow: none; visibility: hidden; }
.dpad-btn.ok { font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 1px; color: #ffdd44; }

.ab-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.ab-btn {
  width: 52px;
  height: 52px;
  border: 0;
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 25%, 100% 75%,
    75% 100%, 25% 100%,
    0% 75%, 0% 25%
  );
}

.ab-btn:active { transform: translate(1px, 1px); }

.ab-btn.btn-a {
  background: #cc3333;
  color: #fff;
  box-shadow: inset 0 -6px 0 0 #771111;
}

.ab-btn.btn-b {
  background: #2255aa;
  color: #fff;
  box-shadow: inset 0 -6px 0 0 #112266;
}

.btn-label {
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 7px;
  color: #6a6a8a;
  text-align: center;
  margin-top: 4px;
  letter-spacing: 1px;
}

.footer-info {
  text-align: center;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  color: #4a4a6a;
  font-size: 7px;
  margin-top: 18px;
  letter-spacing: 2px;
}

.realm-up {
  text-align: center;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 13px;
  color: #ffdd44;
  margin: 8px 0;
  letter-spacing: 2px;
  animation: pixelblink 0.5s steps(2) infinite;
  text-shadow:
    2px 0 0 #996600,
    0 2px 0 #996600,
    2px 2px 0 #996600;
}

@keyframes pixelblink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0.4; }
}

.battle-stats {
  font-size: 12px;
  margin: 8px 0;
  line-height: 1.6;
  color: #cc8800;
}

.ending-title {
  text-align: center;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 15px;
  margin: 8px 0 6px;
  letter-spacing: 3px;
  color: #ffdd44;
  text-shadow:
    2px 0 0 #996600,
    0 2px 0 #996600,
    2px 2px 0 #996600;
}

.ending-summary {
  font-size: 12px;
  line-height: 1.55;
  margin: 6px 0;
}

.items-list {
  font-size: 11px;
  color: #dd88dd;
  margin: 6px 0;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="machine">
  <div class="machine-label">XIUXIAN CORP GX-2026</div>
  <div class="machine-sublabel">CN &middot; AMBER CRT &middot; CULTIVATION ENGINE v2</div>

  <div class="screen-bezel">
    <div class="screen" id="screen"></div>
  </div>

  <div class="controls">
    <div class="dpad">
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="handleInput('up')">&#9650;</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="handleInput('left')">&#9664;</div>
      <div class="dpad-btn ok" onclick="handleInput('ok')">OK</div>
      <div class="dpad-btn" onclick="handleInput('right')">&#9654;</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="handleInput('down')">&#9660;</div>
      <div class="dpad-btn empty"></div>
    </div>
    <div class="ab-buttons">
      <div>
        <div class="ab-btn btn-a" onclick="handleInput('a')">A</div>
        <div class="btn-label">A 确认</div>
      </div>
      <div>
        <div class="ab-btn btn-b" onclick="handleInput('b')">B</div>
        <div class="btn-label">B 返回</div>
      </div>
    </div>
  </div>

  <div class="footer-info">v2.0 &middot; 修仙需谨慎 &middot; 摸鱼有风险</div>
</div>

<script>
const REALMS = [
  { name: '练气期', title: '实习生',     exp: 0 },
  { name: '筑基期', title: '初级工程师', exp: 80 },
  { name: '结丹期', title: '高级工程师', exp: 220 },
  { name: '元婴期', title: '技术主管',   exp: 420 },
  { name: '化神期', title: '架构师',     exp: 700 },
  { name: '大乘期', title: '技术总监',   exp: 1100 },
  { name: '渡劫期', title: 'CTO',        exp: 1700 },
];

const ARCHETYPES = {
  hacker: {
    name: '钻研派',
    flavor: '"代码写到极致，世界自然给你让路"',
    desc: '技术深度优先。起始修为+10，修为获取+20%。',
    startMods: { exp: 10 },
    expMult: 1.2,
  },
  glider: {
    name: '滑行派',
    flavor: '"工作是一阵风，生活才是海"',
    desc: '平衡派。精力上限+30，精力恢复+50%。',
    startMods: { maxHp: 30, hp: 30 },
    hpMult: 1.5,
  },
  climber: {
    name: '攀登派',
    flavor: '"修仙路上，人就是最大的法宝"',
    desc: '职场政治家。起始人脉+15，灵石获取+25%。',
    startMods: { connections: 15 },
    moneyMult: 1.25,
  },
};

const state = {
  screen: 'title',
  archetype: null,
  hp: 100,
  maxHp: 100,
  exp: 0,
  money: 0,
  connections: 0,
  slacking: 0,
  realm: 0,
  day: 1,
  seenEvents: [],
  queuedEvents: [],
  items: [],
  flags: {},
  currentEvent: null,
  selectedChoice: 0,
  menuIndex: 0,
  phase: 'choose',
  resultText: '',
  ending: null,
  totalChoices: 0,
};

const EVENTS = [
  // ==================== 练气期专属 (realm 0) ====================
  {
    id: 'first_day', realm: { max: 1 },
    title: '-- 入门初试 --', monster: '「新人第一天」', flavor: '"欢迎加入团队"',
    text: '你第一天到岗。HR给你发了一本厚厚的员工手册，mentor 在开会，工位上贴着前一个实习生留下的便利贴："祝好运，需要的时候别怕问。"',
    choices: [
      { text: '啃完员工手册，把制度搞清楚', effects: { exp: 10, hp: -5 }, result: '你花了一下午读完手册，发现了两个加班规则的细节。打好地基，走得远。', tag: '+10修为' },
      { text: '跑去问mentor问题，刷存在感', effects: { connections: 8, exp: 5 }, result: 'mentor开完会看到你在工位等她，笑了："主动的人我喜欢。"你被介绍给了三个关键同事。', tag: '+8人脉' },
      { text: '先摸摸环境，观察办公室生态', effects: { slacking: 5, exp: 3, hp: 5 }, result: '你留意到谁和谁中午一起吃饭、谁加班最晚、谁在摸鱼。这些信息以后都用得上。', tag: '+5摸鱼' },
    ]
  },
  {
    id: 'imposter', realm: { max: 1 },
    title: '-- 心魔初现 --', monster: '「冒名顶替之惑」', flavor: '"我是不是根本不配"',
    text: '入职两周，你看懂了1/10的代码库，在周会上被问到一个问题，你的回答让整个会议停顿了两秒。晚上回家躺在床上刷着脉脉，盯着"P7 算法工程师"的帖子。',
    choices: [
      { text: '接受自己是新人这个事实，慢慢来', effects: { exp: 10, hp: 10 }, result: '你意识到: 不会是新人的常态，假装会才是修仙路上最大的劫。放下之后反而能进步。', tag: '+10修为 +10精力' },
      { text: '连夜啃源码到凌晨三点', effects: { exp: 20, hp: -20 }, result: '你终于搞懂了那块代码，还发现一个 edge case。周会上讲出来，leader 多看了你一眼。代价是睡眠。', tag: '+20修为 -20精力' },
    ]
  },
  {
    id: 'first_commit', realm: { max: 1 },
    title: '-- 初出茅庐 --', monster: '「第一次提交」', flavor: '"等下，这真的能合吗"',
    text: '你的第一个 PR。改动只有 18 行。但你来回检查了 5 遍。mentor 的消息来了："写完了？合吧，出问题我兜。"',
    choices: [
      { text: '鼓起勇气点 merge', effects: { exp: 15, hp: -5, connections: 3 }, result: '合上了。没炸。你在工位上偷偷攥了下拳头。第一次提交的那种心跳，后来再也没有过。', tag: '+15修为' },
      { text: '再check一遍，让mentor复核', effects: { exp: 8, connections: 5 }, result: 'mentor看了发现你把一个空格写成了tab。她说："能自查是好事，但也要相信自己。"', tag: '+8修为 +5人脉' },
    ]
  },
  {
    id: 'elder_advice', realm: { max: 1 },
    title: '-- 仙缘际会 --', monster: '「隐世老鸟」', flavor: '"我以前也这么想"',
    text: '团队里有位快要退休的老工程师，主动约你喝咖啡。他问你的职业规划，你说了一堆听起来很聪明的话。他笑了："那些都是别人说的。你自己想要什么？"',
    choices: [
      { text: '坦白: 不知道，正在探索', effects: { exp: 15, connections: 10, hp: 5 }, result: '他认真听你说完，说: 不知道比假装知道强一百倍。送了你一句话: "先把眼前这件事做到最好。"你记了下来。', tag: '+15修为 +10人脉', item: '老鸟的便签', flag: 'met_elder' },
      { text: '编一个听起来靠谱的答案', effects: { exp: 3, connections: -5 }, result: '他听完笑了笑，没再多说。你走出咖啡厅，觉得自己错过了什么。', tag: '+3修为 -5人脉' },
    ]
  },

  // ==================== 筑基期主场 (realm 1-2) ====================
  {
    id: 'req_change', realm: { min: 1 },
    title: '-- 遭遇战 --', monster: '「需求变更兽」', flavor: '"这里再改一下就行了"',
    text: '产品经理凌晨发来消息，需求文档被推翻重写。你打开电脑，发现改动涉及三个核心模块。',
    choices: [
      { text: '连夜重构，用设计模式优雅应对', effects: { exp: 25, hp: -20, money: 5 }, result: '你用策略模式完美隔离了变更。经验大涨，黑眼圈更深了。', tag: '+25修为 -20精力' },
      { text: '先摸会鱼，明天再说', effects: { slacking: 10, hp: 5, exp: 5 }, result: '你打开B站看了两小时，第二天发现需求又改回去了。有时候摸鱼才是最优解。', tag: '+10摸鱼 +5精力' },
      { text: '约PM明早当面对齐，不接受文字改需求', effects: { exp: 15, connections: 5, hp: -5 }, result: '当面聊发现他自己也没想清楚。你们一起砍掉了一半改动。边界是修为的一部分。', tag: '+15修为 +5人脉' },
    ]
  },
  {
    id: 'oncall', realm: { min: 1 },
    title: '-- 夜袭 --', monster: '「凌晨告警妖」', flavor: '"P0 告警: 服务不可用"',
    text: '凌晨3点，手机疯狂震动。线上P0故障，用户量暴跌。值班群里已经@了你三次。',
    choices: [
      { text: '秒起床，远程定位并修复', effects: { exp: 30, connections: 15, hp: -25, money: 10 }, result: '你在47分钟内定位到是缓存击穿，紧急上线热修复。CTO在群里说了句"不错"。这两个字价值千金。', tag: '+30修为 +15人脉 -25精力', flag: 'saved_prod' },
      { text: '装没看到，等白天再处理', effects: { hp: 10, connections: -15, slacking: 15 }, result: '第二天到公司发现已经有人帮你处理了，但你的名字上了oncall黑名单。有些修为逃不掉。', tag: '-15人脉 +15摸鱼' },
      { text: '打电话叫醒备份同事', effects: { exp: 10, connections: -5, hp: 0 }, result: '同事第二天没给你好脸色，但问题解决了。你学到一个道理: 有些仗不必自己打，但要学会欠人情的边界。', tag: '+10修为 -5人脉' },
    ]
  },
  {
    id: 'code_review', realm: { min: 1 },
    title: '-- 论道切磋 --', monster: '「代码审查仙」', flavor: '"这里为什么这样写"',
    text: '你提交的PR被一个资深同事留了28条comment。有些确实是问题，有些你觉得是风格偏好。',
    choices: [
      { text: '逐条认真回复，该改改，该解释解释', effects: { exp: 20, connections: 10, hp: -10 }, result: '来回三轮后PR合并了。那个同事后来私聊: "你的回复质量很高。"一次好的Code Review抵十次技术分享。', tag: '+20修为 +10人脉', flag: 'rival_respects' },
      { text: '全部Resolve，备注"已修改"', effects: { exp: 5, connections: -10, slacking: 5 }, result: 'PR快速合并了，但那个同事再也没认真Review过你的代码。你失去了一个免费的师父。', tag: '+5修为 -10人脉' },
    ]
  },
  {
    id: 'friday_deploy', realm: { min: 1 },
    title: '-- 周五危机 --', monster: '「Friday Deploy 禁术」', flavor: '"上线吧，就差这一下了"',
    text: '周五下午五点半。产品说这个功能必须今天上，下周一就要对外演示。改动不大，测试充分。但你心里有根弦: 周五上线，老祖宗说过要出事。',
    choices: [
      { text: '坚决推到周一早上', effects: { exp: 15, connections: -5, hp: 10 }, result: '产品不高兴。但周六监控告警响了个别的模块，隔壁组值班同事崩溃，你感谢自己没凑热闹。', tag: '+15修为 +10精力' },
      { text: '硬上，一起值班到深夜', effects: { exp: 20, hp: -25, money: 5, connections: 5 }, result: '凌晨两点功能上线了。没出问题。你瘫在沙发上给老婆发了条"还有半小时回家"的谎话。', tag: '+20修为 -25精力' },
      { text: '把功能拆一半，先上稳的那一半', effects: { exp: 25, connections: 10, hp: -5 }, result: '产品勉强接受。上线丝滑。这就是 Tech Lead 的判断力: 该推的时候敢推。', tag: '+25修为 +10人脉' },

// ==================== 引擎 ====================

function applyArchetypeMods() {
  const a = ARCHETYPES[state.archetype];
  if (!a) return;
  const m = a.startMods || {};
  Object.keys(m).forEach(k => { state[k] = (state[k] || 0) + m[k]; });
}

function nextRealm() {
  if (state.realm < REALMS.length - 1) {
    const next = REALMS[state.realm + 1];
    if (state.exp >= next.exp) return true;
  }
  return false;
}

function checkEnding() {
  if (state.hp <= 0) return 'burnout';
  if (state.slacking >= 100) return 'slacker';
  if (state.flags.founder_path && state.money >= 80 && state.exp >= 400) return 'founder';
  if (state.money >= 250) return 'rich';
  if (state.realm >= REALMS.length - 1 && state.exp >= 2200) return 'ascend';
  if (state.day >= 180 && state.hp >= 80 && state.connections >= 40 && state.slacking < 60) return 'sage';
  if (state.connections >= 100 && state.flags.has_disciple) return 'mentor';
  if (state.day >= 250) return 'exile';
  return null;
}

function eventAvailable(e) {
  if (state.seenEvents.includes(e.id) && state.seenEvents.length < EVENTS.length * 0.7) return false;
  if (e.realm) {
    if (e.realm.min !== undefined && state.realm < e.realm.min) return false;
    if (e.realm.max !== undefined && state.realm > e.realm.max) return false;
  }
  if (e.requires) {
    for (const flag of e.requires) if (!state.flags[flag]) return false;
  }
  return true;
}

function pickEvent() {
  if (state.queuedEvents.length > 0) {
    const id = state.queuedEvents.shift();
    const e = EVENTS.find(x => x.id === id);
    if (e) return e;
  }
  const available = EVENTS.filter(eventAvailable);
  if (available.length === 0) return EVENTS[Math.floor(Math.random() * EVENTS.length)];
  return available[Math.floor(Math.random() * available.length)];
}

function pickTribulation() {
  const idx = Math.min(state.realm, TRIBULATIONS.length - 1);
  return TRIBULATIONS[idx];
}

function getMult(key, fallback = 1) {
  const a = ARCHETYPES[state.archetype];
  if (!a) return fallback;
  if (key === 'exp' && a.expMult) return a.expMult;
  if (key === 'hp' && a.hpMult) return a.hpMult;
  if (key === 'money' && a.moneyMult) return a.moneyMult;
  return fallback;
}

function applyEffects(effects) {
  const lines = [];
  if (effects.exp) {
    const v = effects.exp > 0 ? Math.round(effects.exp * getMult('exp')) : effects.exp;
    state.exp = Math.max(0, state.exp + v);
    lines.push(v > 0 ? `<span class="gain">修为 +${v}</span>` : `<span class="lose">修为 ${v}</span>`);
  }
  if (effects.hp) {
    const v = effects.hp > 0 ? Math.round(effects.hp * getMult('hp')) : effects.hp;
    state.hp = Math.min(state.maxHp, Math.max(0, state.hp + v));
    lines.push(v > 0 ? `<span class="gain">精力 +${v}</span>` : `<span class="lose">精力 ${v}</span>`);
  }
  if (effects.money) {
    const v = effects.money > 0 ? Math.round(effects.money * getMult('money')) : effects.money;
    state.money = Math.max(0, state.money + v);
    lines.push(v > 0 ? `<span class="gain">灵石 +${v}</span>` : `<span class="lose">灵石 ${v}</span>`);
  }
  if (effects.connections) {
    state.connections = Math.max(0, state.connections + effects.connections);
    lines.push(effects.connections > 0 ? `<span class="gain">人脉 +${effects.connections}</span>` : `<span class="lose">人脉 ${effects.connections}</span>`);
  }
  if (effects.slacking) {
    state.slacking += effects.slacking;
    lines.push(`<span class="event">摸鱼 +${effects.slacking}</span>`);
  }
  return lines.join('  ');
}

}

function renderEvent() {
  const e = state.currentEvent;
  const r = REALMS[state.realm];
  let html = renderStats();
  html += `<div style="font-size:11px;color:#996600;margin-bottom:8px">${r.name}（${r.title}）&middot; 第${state.day}天 &middot; ${ARCHETYPES[state.archetype].name}</div>`;
  html += `<div class="scene-title">${e.title}</div>`;
  html += `<div class="scene-title" style="font-size:15px">${e.monster}</div>`;
  html += `<div class="scene-flavor">${e.flavor}</div>`;
  html += `<div class="narrative">${e.text}</div>`;
  html += `<div class="divider">- - - - - -</div>`;

  if (state.phase === 'choose') {
    e.choices.forEach((c, i) => {
      const sel = i === state.selectedChoice ? '&#9654; ' : '  ';
      html += `<div class="choice ${i === state.selectedChoice ? 'selected' : ''}" onclick="selectChoice(${i})">
        <span class="key">${sel}</span>${String.fromCharCode(65 + i)}. ${c.text}
        <span class="tag">${c.tag || ''}</span>
      </div>`;
    });
    html += `<div class="prompt">[ A/OK 确认选择 &middot; 方向键切换 ]</div>`;
  } else {
    const c = e.choices[state.selectedChoice];
    html += `<div class="result-text">${c.result}</div>`;
    html += `<div class="result-text" style="margin-top:8px">${state.resultText}</div>`;
    if (c.item && state.phase === 'result') {
      html += `<div class="result-text"><span class="item">获得物品: ${c.item}</span></div>`;
    }
    if (state.phase === 'realm_up') {
      const nr = REALMS[state.realm];
      html += `<div class="realm-up">*** 突破！${nr.name}（${nr.title}）***</div>`;
    }
    html += `<div class="prompt">[ 按 A 继续 ]</div>`;
  }

  return html;
}

function renderTribulation() {
  const t = state.currentEvent;
  let html = renderStats();
  html += `<div class="scene-title" style="font-size:15px; color:#ffdd44">${t.title}</div>`;
  html += `<div class="narrative">${t.text}</div>`;

  if (state.phase === 'choose') {
    const rate = calcTribSuccess(t);
    html += `<div class="battle-stats">
      修为: ${state.exp} &middot; 人脉: ${state.connections} &middot; 精力: ${state.hp}<br>
      预估渡劫成功率: <span style="color:#ffdd44">${Math.floor(rate * 100)}%</span>
    </div>`;
    html += `<div class="choice ${state.selectedChoice === 0 ? 'selected' : ''}" onclick="selectChoice(0)"><span class="key">${state.selectedChoice === 0 ? '&#9654; ' : '  '}</span>[A] 渡劫</div>`;
    html += `<div class="choice ${state.selectedChoice === 1 ? 'selected' : ''}" onclick="selectChoice(1)"><span class="key">${state.selectedChoice === 1 ? '&#9654; ' : '  '}</span>[B] 暂避锋芒</div>`;
    html += `<div class="prompt">[ 选择你的命运 ]</div>`;
  } else {
    html += `<div class="result-text">${state.resultText}</div>`;
    if (state.phase === 'realm_up') {
      const nr = REALMS[state.realm];
      html += `<div class="realm-up">*** 渡劫成功！${nr.name}（${nr.title}）***</div>`;
    }
    html += `<div class="prompt">[ 按 A 继续 ]</div>`;
  }
  return html;
}

function calcTribSuccess(t) {
  const nextExp = REALMS[state.realm + 1]?.exp || 2500;
  const base = (state.exp / nextExp) * 0.5;
  const connBonus = state.connections * 0.003;
  const hpBonus = (state.hp / state.maxHp) * 0.15;
  const slackPenalty = state.slacking * 0.001;
  const flagBonus = (state.flags.saved_prod ? 0.05 : 0) + (state.flags.public_speaker ? 0.05 : 0) + (state.flags.met_elder ? 0.03 : 0);
  return Math.max(0.15, Math.min(0.95, base + connBonus + hpBonus - slackPenalty + flagBonus));
}

function renderEnding() {
  const e = ENDINGS[state.ending];
  const r = REALMS[state.realm];
  let html = `
    <div class="ending-title">${e.title}</div>
    <div class="scene-flavor">${e.subtitle}</div>
    <div class="divider">= = = = = = = =</div>
    <div class="ending-summary">${e.text}</div>
    <div class="divider">= = = = = = = =</div>
    <div class="ending-summary">
      流派: ${ARCHETYPES[state.archetype].name}<br>
      最终境界: ${r.name}（${r.title}）<br>
      存活天数: ${state.day}天<br>
      总修为: ${state.exp} &middot; 灵石: ${state.money}<br>
      人脉: ${state.connections} &middot; 摸鱼值: ${state.slacking}<br>
      做出了 ${state.totalChoices} 次选择
    </div>`;
  if (state.items.length > 0) {
    html += `<div class="items-list">获得物品: ${state.items.join('、')}</div>`;
  }
  html += `<div class="prompt">[ 按 A 重新修炼 ]</div>`;
  return html;
}

function render() {
  const screen = document.getElementById('screen');
  let html = '';
  switch (state.screen) {
    case 'title': html = renderTitle(); break;
    case 'archetype': html = renderArchetype(); break;
    case 'event': html = renderEvent(); break;
    case 'tribulation': html = renderTribulation(); break;
    case 'ending': html = renderEnding(); break;
  }
  screen.innerHTML = html;
  screen.scrollTop = 0;
}

function selectChoice(i) {
  if (state.phase !== 'choose') return;
  state.selectedChoice = i;
  render();
}

function selectArchetype(i) {
  state.menuIndex = i;
  render();
}

function goToArchetype() {
  state.screen = 'archetype';
  state.menuIndex = 0;
  render();
}

function startGame() {
  const ids = Object.keys(ARCHETYPES);
  const archetype = ids[state.menuIndex];
  Object.assign(state, {
    screen: 'event',
    archetype,
    hp: 100, maxHp: 100,
    exp: 0, money: 0,
    connections: 0, slacking: 0,
    realm: 0, day: 0,
    seenEvents: [], queuedEvents: [],
    items: [], flags: {},
    currentEvent: null,
    selectedChoice: 0, menuIndex: 0, phase: 'choose',
    resultText: '', ending: null, totalChoices: 0,
  });
  applyArchetypeMods();
  nextDay();
}

function nextDay() {
  state.day++;

  const ending = checkEnding();
  if (ending) {
    state.ending = ending;
    state.screen = 'ending';
    render();
    return;
  }

  if (nextRealm() && state.day > 3) {
    const t = pickTribulation();
    state.currentEvent = t;
    state.screen = 'tribulation';
    state.phase = 'choose';
    state.selectedChoice = 0;
    render();
    return;
  }

  const e = pickEvent();
  state.currentEvent = e;
  if (!state.seenEvents.includes(e.id)) state.seenEvents.push(e.id);
  state.screen = 'event';
  state.phase = 'choose';
  state.selectedChoice = 0;
  render();
}

function confirmChoice() {
  if (state.screen === 'title') { goToArchetype(); return; }
  if (state.screen === 'archetype') { startGame(); return; }
  if (state.screen === 'ending') { state.screen = 'title'; state.menuIndex = 0; render(); return; }

  if (state.phase !== 'choose') {
    nextDay();
    return;
  }

  state.totalChoices++;
  const e = state.currentEvent;

  if (state.screen === 'tribulation') {
    const successRate = calcTribSuccess(e);
    if (state.selectedChoice === 0) {
      if (Math.random() < successRate) {
        state.realm++;
        state.maxHp += 20;
        state.hp = Math.min(state.maxHp, state.hp + 30);
        state.resultText = `<span class="gain">${e.successText}</span>`;
        state.phase = 'realm_up';
      } else {
        state.hp = Math.max(0, state.hp - 20);
        state.exp = Math.max(0, state.exp - 30);
        state.resultText = `<span class="lose">${e.failText}</span>`;
        state.phase = 'result';
      }
    } else {
      state.resultText = '你选择韬光养晦，等待更好的时机。';
      state.phase = 'result';
    }
    render();
    return;
  }

  const c = e.choices[state.selectedChoice];
  state.resultText = applyEffects(c.effects);
  if (c.item) state.items.push(c.item);
  if (c.flag) state.flags[c.flag] = true;
  if (c.next) state.queuedEvents.push(c.next);

  if (nextRealm()) {
    state.phase = 'result';
  } else {
    state.phase = 'result';
  }

  render();
}

function handleInput(key) {
  switch (key) {
    case 'a':
    case 'ok':
      if (state.screen === 'title') { goToArchetype(); return; }
      if (state.screen === 'archetype') { startGame(); return; }
      confirmChoice();
      break;
    case 'b':
      if (state.screen === 'archetype') { state.screen = 'title'; render(); }
      break;
    case 'up':
    case 'left':
      if (state.screen === 'archetype') {
        state.menuIndex = Math.max(0, state.menuIndex - 1);
        render();
      } else if (state.phase === 'choose') {
        state.selectedChoice = Math.max(0, state.selectedChoice - 1);
        render();
      }
      break;
    case 'down':
    case 'right':
      if (state.screen === 'archetype') {
        const max = Object.keys(ARCHETYPES).length - 1;
        state.menuIndex = Math.min(max, state.menuIndex + 1);
        render();
      } else if (state.phase === 'choose' && state.currentEvent) {
        const max = state.screen === 'tribulation' ? 1 : (state.currentEvent.choices?.length || 2) - 1;
        state.selectedChoice = Math.min(max, state.selectedChoice + 1);
        render();
      }
      break;
  }
}

document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp': case 'w': handleInput('up'); break;
    case 'ArrowDown': case 's': handleInput('down'); break;
    case 'ArrowLeft': handleInput('left'); break;
    case 'ArrowRight': handleInput('right'); break;
    case 'Enter': case ' ': case 'j': handleInput('a'); break;
    case 'Escape': case 'k': handleInput('b'); break;
  }
  e.preventDefault();
});

render();
</script>
